name: Build Exes

on:
  push:
  pull_request:

env:
  CHOCOLATEY_CACHE_DIR: ${{ github.workspace }}\chocolatey_cache
  CHOCOLATEY_REPO: 'https://pkgs.dev.azure.com/edmcman/choco-vc/_packaging/choco-vc@Local/nuget/v2'

jobs:
  build:
    name: Build ${{ matrix.vsVersion.displayName }} ${{ matrix.arch.displayName }}
    strategy:
      fail-fast: false
      matrix:
        vsVersion:
          - name: vs2008
            displayName: "Visual C++ Express 2008"
            chocoPackages: "msvisualcpp-2008sp1express msvisualcpp-2010express"
            cmakeGenName: "Visual Studio 14 2015"
            cmakeGenToolsetArg: "-T v90"
            extraPath: 'C:\Windows\Microsoft.NET\Framework\v4.0.30319'
            has64: false
            runsOn: windows-latest

          - name: vs2010
            displayName: "Visual C++ Express 2010"
            chocoPackages: "msvisualcpp-2010express"
            cmakeGenName: "Visual Studio 14 2015"
            cmakeGenToolsetArg: "-T v100"
            extraPath: 'C:\Windows\Microsoft.NET\Framework\v4.0.30319'
            has64: false
            runsOn: windows-latest

          - name: vs2012
            displayName: "Visual C++ Express 2012"
            chocoPackages: "msvisualstudio-2012express"
            cmakeGenName: "Visual Studio 17 2022"
            cmakeGenToolsetArg: "-T v110"
            extraPath: 'C:\Windows\Microsoft.NET\Framework\v4.0.30319'
            has64: true
            runsOn: windows-latest

          - name: vs2013
            displayName: "Visual C++ Express 2013"
            chocoPackages: "msvisualstudio-2013express"
            cmakeGenName: "Visual Studio 17 2022"
            cmakeGenToolsetArg: "-T v120"
            extraPath: 'C:\Windows\Microsoft.NET\Framework\v4.0.30319'
            has64: true
            runsOn: windows-latest

          - name: vs2015
            displayName: "Visual C++ 2015"
            chocoPackages: "msvisualstudio-2015community"
            cmakeGenName: "Visual Studio 14 2015"
            cmakeGenToolsetArg: ""
            extraPath: ""
            has64: true
            runsOn: windows-latest

          - name: vs2017
            displayName: "Visual C++ 2017"
            chocoPackages: "visualstudio2017buildtools visualstudio2017-workload-vctools"
            cmakeGenName: "Visual Studio 15 2017"
            cmakeGenToolsetArg: ""
            extraPath: ""
            has64: true
            runsOn: windows-latest

          - name: vs2022
            displayName: "Visual C++ 2022"
            chocoPackages: ""
            cmakeGenName: "Visual Studio 17 2022"
            cmakeGenToolsetArg: ""
            extraPath: ""
            has64: true
            runsOn: windows-2022

        arch:
          - name: x86
            displayName: x86
            cmakeArch: win32
            toolsetArch: x86

          - name: x86_64
            displayName: x86-64
            cmakeArch: x64
            toolsetArch: x64

        exclude:
          - vsVersion: { has64: false }
            arch: { name: x86_64 }

    runs-on: ${{ matrix.vsVersion.runsOn }}
    env:
      PUBLISH_DIR: ${{ github.workspace }}\publish

    steps:
      - uses: actions/checkout@v6

      - name: Cache chocolatey
        uses: actions/cache@v5
        with:
          key: chocolatey-${{ runner.os }}-${{ matrix.vsVersion.chocoPackages }}
          restore-keys: chocolatey-${{ runner.os }}
          path: ${{ env.CHOCOLATEY_CACHE_DIR }}

      - name: Add chocolatey repo
        shell: cmd
        run: choco source add -n=ed -s "${{ env.CHOCOLATEY_REPO }}"

      - name: Set chocolatey cache dir
        shell: cmd
        run: choco config set cacheLocation "${{ env.CHOCOLATEY_CACHE_DIR }}"

      - name: Install cmake
        shell: cmd
        run: choco install -y cmake

      - name: Install VS packages
        if: matrix.vsVersion.chocoPackages != ''
        shell: pwsh
        run: |
          foreach ($p in "${{ matrix.vsVersion.chocoPackages }}".Split(" ")) {
            choco install --timeout 0 --pre -d -y $p
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          }

      - name: Debug chocolatey failure
        if: failure()
        shell: pwsh
        run: |
          Get-Content "${{ env.CHOCOLATEY_CACHE_DIR }}\vs.log" -ErrorAction SilentlyContinue
          Get-Content "C:\ProgramData\chocolatey\logs\chocolatey.log" -ErrorAction SilentlyContinue

      - name: Add extra path
        if: matrix.vsVersion.extraPath != ''
        shell: pwsh
        run: Add-Content $env:GITHUB_PATH "${{ matrix.vsVersion.extraPath }}"

      - name: Build variants
        shell: pwsh
        run: |
          $env:PATH = "$env:ProgramFiles\cmake\bin;$env:PATH"

          # Append host arch to toolset arg, matching Azure pipeline logic
          $toolsetArg = "${{ matrix.vsVersion.cmakeGenToolsetArg }}"
          if ($toolsetArg) { $toolsetArg += ",host=${{ matrix.arch.toolsetArch }}" }
          $toolsetArgs = if ($toolsetArg) { @($toolsetArg) } else { @() }

          $variants = @(
            @{ name = "normal"; cmakeFlags = @("-D", "CMAKE_USE_WPO=OFF") },
            @{ name = "wpo";    cmakeFlags = @("-D", "CMAKE_USE_WPO=ON") },
            @{ name = "static"; cmakeFlags = @("-D", "CMAKE_USE_WPO=OFF", "-D", "CMAKE_MSVC_STATIC=ON") }
          )

          foreach ($v in $variants) {
            $buildDir = "tests\src\oo\build-$($v.name)"
            New-Item -ItemType Directory -Force -Path $buildDir | Out-Null
            Push-Location $buildDir

            $configArgs = @("-A", "${{ matrix.arch.cmakeArch }}") + $v.cmakeFlags + @("-G", "${{ matrix.vsVersion.cmakeGenName }}") + $toolsetArgs + @("..")
            & cmake.exe @configArgs
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

            & cmake.exe --build . --verbose --config Debug
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Remove-Item "Debug\*.ilk", "Debug\*.iobj", "Debug\*.ipdb" -ErrorAction SilentlyContinue

            & cmake.exe --build . --verbose --config Release
            if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
            Remove-Item "Release\*.ilk", "Release\*.iobj", "Release\*.ipdb" -ErrorAction SilentlyContinue

            $variantDir = "${{ env.PUBLISH_DIR }}\${{ matrix.vsVersion.name }}_${{ matrix.arch.name }}\$($v.name)"
            New-Item -ItemType Directory -Force -Path $variantDir | Out-Null
            Move-Item "Debug"   $variantDir
            Move-Item "Release" $variantDir

            Pop-Location
          }

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.vsVersion.name }}_${{ matrix.arch.name }}
          path: ${{ env.PUBLISH_DIR }}

  combine:
    name: Combine Artifacts
    needs: build
    runs-on: windows-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: combine

      - name: Upload combined artifacts
        uses: actions/upload-artifact@v7
        with:
          name: AllArtifacts
          path: combine
